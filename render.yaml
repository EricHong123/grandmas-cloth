services:
  - type: web
    name: grandmas-cloth-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/seed/seed.js && node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
