app = "grandmas-cloth-api"

[build]
  dockerfile = "Dockerfile"

[[vm]]
  memory = "512mb"

[[mounts]]
  source = "sqlite_data"
  destination = "/app/data"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
